[workspace]
name = "diffusion"
version = "0.1.0"
description = "Diffusion model environment for nyl12 loop engineering"
authors = []
platforms = ["linux-64"]

channels = [
    "pytorch",
    "conda-forge",
    "nvidia",
    "https://conda.graylab.jhu.edu",
    "protein-design",
    "dglteam/label/cu118",
    "pyg",
    "bioconda",
    "schrodinger",
    "dacase",
]
channel-priority = "disabled"

[environments]
rf = ["rf"]
rf3 = ["rf3"]
af3 = ["af3"]
ligand = ["ligand"]
colabfold = ["colabfold"]
boltz = ["boltz"]
analysis = ["analysis"]

[feature.boltz.dependencies]
    python = "3.10.*"
    pytest = "*"
    jinja2 = "*"


[feature.analysis.dependencies]
    python = "3.12.*"
    pymol-bundle = "*"
    pandas = "*"
    natsort = "*"
    tabulate = "*"
    hydra-core = "*"
    ambertools-dac = "25.*"
    openmm = "*"
    cudatoolkit = "11.8.*"
    pyrosetta = "*"

[feature.colabfold.dependencies]
    python = "3.10.*"
    mmseqs2 = "*"
    hhsuite = "*"
    pdbfixer = "*"

[feature.colabfold.pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://example.com/simple"]
find-links = [{url= 'https://storage.googleapis.com/jax-releases/jax_cuda_releases.html'}]

[feature.colabfold.pypi-dependencies]
    colabfold = { git = "git+https://github.com/sokrypton/ColabFold", extras=["alphafold"] }
    jax = {version="*",extras=["cuda"]}

[feature.boltz.pypi-dependencies]
    boltz = {version="*",extras=["cuda"]}
    hydra-core = "*"

[feature.rf.dependencies]
    rf_diffusion_all_atom = "*"

[feature.rf3.dependencies]
    python = "3.12.*"
    hydra-core = "*"

[feature.af3.dependencies]
    python = "3.11.*"
    hydra-core = "*"
    zlib  = "*"
    gcc_linux-64  = "*"
    gxx_linux-64   = "*"
    requests  = "*"
    hmmer = "*"
    cuda-toolkit = "12.6.*"

[feature.ligand.dependencies]
    python = "3.9.*"
    hydra-core = "*"

[feature.ligand.pypi-dependencies]
    pd-ligand-mpnn = ">=0.1.2"

[feature.rf3.pypi-dependencies]
    rc-foundry = {version="*",extras=["all"]}

[feature.af3.pypi-dependencies]
    alphafold3 = { git = "git+https://github.com/Kuhlman-Lab/alphafold3"}
    setuptools = "*"

[feature.ligand.tasks]
    run-ligand = "run-ligand"

[feature.rf.tasks]
    run-inference = "run-inference"

[feature.af3.tasks]
    build-af3-data = "python -c 'from alphafold3.build_data import build_data; build_data()'"

[feature.boltz.tasks]
    boltz = "boltz"
